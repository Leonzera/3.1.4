<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Admin panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark p-2 text-white">
    <div class="container-fluid d-flex">
        <span class="navbar-text text-white">
            <strong th:text="${#authentication.name}">admin@mail.ru</strong>
            with roles:
            <span th:each="auth : ${#authentication.authorities}"
                  th:if="${!#strings.contains(auth.authority, 'FACTOR') && !#strings.contains(auth.authority, 'OTP')}"
                  th:text="${#strings.replace(auth.authority, 'ROLE_', '') + ' '}">ADMIN USER</span>
        </span>

        <form th:action="@{/logout}" method="post" class="m-0 ms-auto">
            <button type="submit" class="btn btn-dark text-secondary text-decoration-none shadow-none">Logout</button>
        </form>
    </div>
</nav>

<div class="container-fluid">
    <div class="row mt-3">
        <div class="col-2 px-0">
            <div class="nav flex-column nav-pills" aria-orientation="vertical">
                <a class="nav-link active" href="/admin">Admin</a>
                <a class="nav-link" href="/user">User</a>
            </div>
        </div>

        <div class="col-10 bg-light vh-100 px-4">
            <h1>Admin panel</h1>

            <ul class="nav nav-tabs" id="myTab" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="users-table-tab" data-bs-toggle="tab" data-bs-target="#users-table" type="button" role="tab">Users table</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="new-user-tab" data-bs-toggle="tab" data-bs-target="#new-user" type="button" role="tab">New User</button>
                </li>
            </ul>

            <div class="tab-content" id="myTabContent">

                <div class="tab-pane fade show active" id="users-table" role="tabpanel">
                    <div class="card border-top-0 rounded-bottom">
                        <div class="card-header h5">All users</div>
                        <div class="card-body">
                            <table class="table table-striped table-hover border-top">
                                <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Name</th>
                                    <th>Email</th>
                                    <th>Role</th>
                                    <th>Edit</th>
                                    <th>Delete</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="user : ${users}">
                                    <td th:text="${user.id}"></td>
                                    <td th:text="${user.username}"></td>
                                    <td th:text="${user.email}"></td>
                                    <td>
                                        <span th:each="role : ${user.roles}" th:text="${#strings.replace(role.name, 'ROLE_', '') + ' '}"></span>
                                    </td>
                                    <td>
                                        <button type="button" class="btn btn-info text-white" data-bs-toggle="modal" th:data-bs-target="'#editModal' + ${user.id}">Edit</button>
                                    </td>
                                    <td>
                                        <button type="button" class="btn btn-danger" data-bs-toggle="modal" th:data-bs-target="'#deleteModal' + ${user.id}">Delete</button>
                                    </td>

                                    <div class="modal fade" th:id="'editModal' + ${user.id}" tabindex="-1" aria-hidden="true">
                                        <div class="modal-dialog modal-dialog-centered">
                                            <div class="modal-content">
                                                <div class="modal-header">
                                                    <h5 class="modal-title">Edit user</h5>
                                                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                                                </div>
                                                <form th:action="@{/admin/edit/{id}(id=${user.id})}" method="post">
                                                    <div class="modal-body text-center w-50 mx-auto">
                                                        <label class="form-label fw-bold mt-2">ID</label>
                                                        <input type="text" class="form-control" name="id" th:value="${user.id}" readonly>

                                                        <label class="form-label fw-bold mt-2"> name</label>
                                                        <input type="text" class="form-control" name="username" th:value="${user.username}">

                                                        <label class="form-label fw-bold mt-2">Email</label>
                                                        <input type="email" class="form-control" name="email" th:value="${user.email}">

                                                        <label class="form-label fw-bold mt-2">Password</label>
                                                        <input type="password" class="form-control" name="password"th:value="${user.password}">

                                                        <label class="form-label fw-bold mt-2">Role</label>
                                                        <select class="form-select" size="2" name="rolesList" multiple required>
                                                            <option value="ROLE_ADMIN">ADMIN</option>
                                                            <option value="ROLE_USER">USER</option>
                                                        </select>
                                                    </div>
                                                    <div class="modal-footer">
                                                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                                                        <button type="submit" class="btn btn-primary">Edit</button>
                                                    </div>
                                                </form>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="modal fade" th:id="'deleteModal' + ${user.id}" tabindex="-1" aria-hidden="true">
                                        <div class="modal-dialog modal-dialog-centered">
                                            <div class="modal-content">
                                                <div class="modal-header">
                                                    <h5 class="modal-title">Delete user</h5>
                                                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                                                </div>
                                                <form th:action="@{/admin/delete}" method="post">
                                                    <div class="modal-body text-center w-50 mx-auto">
                                                        <input type="hidden" name="id" th:value="${user.id}">

                                                        <label class="form-label fw-bold mt-2">ID</label>
                                                        <input type="text" class="form-control" th:value="${user.id}" disabled>

                                                        <label class="form-label fw-bold mt-2">First name</label>
                                                        <input type="text" class="form-control" th:value="${user.username}" disabled>

                                                        <label class="form-label fw-bold mt-2">Email</label>
                                                        <input type="email" class="form-control" th:value="${user.email}" disabled>

                                                        <label class="form-label fw-bold mt-2">Role</label>
                                                        <select class="form-select" size="2" disabled>
                                                            <option th:each="role : ${user.roles}" th:text="${#strings.replace(role.name, 'ROLE_', '')}"></option>
                                                        </select>
                                                    </div>
                                                    <div class="modal-footer">
                                                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                                                        <button type="submit" class="btn btn-danger">Delete</button>
                                                    </div>
                                                </form>
                                            </div>
                                        </div>
                                    </div>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div class="tab-pane fade" id="new-user" role="tabpanel">
                    <div class="card border-top-0 rounded-bottom">
                        <div class="card-header h5">Add new user</div>
                        <div class="card-body d-flex justify-content-center">
                            <form th:action="@{/admin/save}" method="post" class="text-center w-25">

                                <label class="form-label fw-bold mt-2">First name</label>
                                <input type="text" class="form-control bg-warning bg-opacity-25" name="username" required>

                                <label class="form-label fw-bold mt-2">Email</label>
                                <input type="email" class="form-control bg-warning bg-opacity-25" name="email" required>

                                <label class="form-label fw-bold mt-2">Password</label>
                                <input type="password" class="form-control" name="password" required>

                                <label class="form-label fw-bold mt-2">Role</label>
                                <select class="form-select" size="2" name="rolesList" multiple required>
                                    <option value="ROLE_ADMIN">ADMIN</option>
                                    <option value="ROLE_USER">USER</option>
                                </select>

                                <button type="submit" class="btn btn-success mt-4 mb-3 btn-lg">Add new user</button>
                            </form>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

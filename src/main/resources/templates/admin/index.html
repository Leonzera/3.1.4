<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Админ-панель</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 1000px; margin: 20px auto; }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #4CAF50; color: white; }
        tr:hover { background-color: #f5f5f5; }
        .btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; }
        .btn-add { background: #4CAF50; color: white; }
        .btn-edit { background: #2196F3; color: white; }
        .btn-delete { background: #f44336; color: white; }
        .btn-logout { background: #555; color: white; }
    </style>
</head>
<body>
<h1>👑 Админ-панель</h1>

<p>
    Вы вошли как: <strong sec:authentication="name"></strong>
    (роли: <strong sec:authentication="authorities"></strong>)
</p>

<a href="/admin/new" class="btn btn-add">➕ Добавить пользователя</a>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Логин</th>
        <th>Email</th>
        <th>Роли</th>
        <th>Действия</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="user : ${users}">
        <td th:text="${user.id}"></td>
        <td th:text="${user.username}"></td>
        <td th:text="${user.email}"></td>
        <td>
                    <span th:each="role, iter : ${user.roles}"
                          th:text="${role.name} + (iter.last ? '' : ', ')"></span>
        </td>
        <td>
            <a th:href="@{/admin/edit/{id}(id=${user.id})}" class="btn btn-edit">✏️</a>
            <a th:href="@{/admin/delete/{id}(id=${user.id})}"
               class="btn btn-delete"
               onclick="return confirm('Удалить пользователя?')">🗑️</a>
        </td>
    </tr>
    </tbody>
</table>

<div>
    <a href="/user" class="btn">👤 Моя страница</a>
    <form th:action="@{/logout}" method="post" style="display: inline;">
        <button type="submit" class="btn btn-logout">🚪 Выйти</button>
    </form>
</div>
</body>
</html>

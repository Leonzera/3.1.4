<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Личный кабинет</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; }
        .card { border: 1px solid #ddd; padding: 20px; border-radius: 8px; }
        .btn { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; display: inline-block; }
        .btn-admin { background: #FF9800; color: white; }
        .btn-logout { background: #f44336; color: white; }
    </style>
</head>
<body>
<h1>👤 Личный кабинет</h1>

<div class="card">
    <h2>Добро пожаловать, <span th:text="${user.username}">User</span>!</h2>

    <h3>Ваши данные:</h3>
    <ul>
        <li><strong>ID:</strong> <span th:text="${user.id}"></span></li>
        <li><strong>Логин:</strong> <span th:text="${user.username}"></span></li>
        <li><strong>Email:</strong> <span th:text="${user.email}"></span></li>
    </ul>

    <h3>Роли:</h3>
    <ul>
        <li th:each="role : ${user.roles}" th:text="${role.name}">ROLE_USER</li>
    </ul>


    <div sec:authorize="hasRole('ADMIN')" style="margin-bottom: 15px;">
        <a href="/admin" class="btn btn-admin">⚙️ Админ-панель</a>
    </div>

    <!-- Форма выхода -->
    <form th:action="@{/logout}" method="post" style="display: inline;">
        <button type="submit" class="btn btn-logout">🚪 Выйти</button>
    </form>
</div>
</body>
</html>

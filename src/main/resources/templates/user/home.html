<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>User page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark p-2 text-white">
    <div class="container-fluid d-flex">
        <span class="navbar-text text-white">
            <strong th:text="${#authentication.name}">admin@mail.ru</strong>
            with roles:
            <span th:each="auth : ${#authentication.authorities}"
                  th:if="${!#strings.contains(auth.authority, 'FACTOR') && !#strings.contains(auth.authority, 'OTP')}"
                  th:text="${#strings.replace(auth.authority, 'ROLE_', '') + ' '}">ADMIN USER</span>
        </span>

        <form th:action="@{/logout}" method="post" class="m-0 ms-auto">
            <button type="submit" class="btn btn-dark text-secondary text-decoration-none shadow-none">Logout</button>
        </form>
    </div>
</nav>

<div class="container-fluid">
    <div class="row mt-3">
        <div class="col-2 px-0">
            <div class="nav flex-column nav-pills" aria-orientation="vertical">
                <a sec:authorize="hasRole('ADMIN')" class="nav-link" href="/admin">Admin</a>
                <a class="nav-link active" href="/user">User</a>
            </div>
        </div>

        <div class="col-10 bg-light vh-100 px-4">
            <h1>User information-page</h1>

            <div class="card mt-3">
                <div class="card-header h5">About user</div>
                <div class="card-body">
                    <table class="table table-striped table-hover border-top">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Role</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr>
                            <td th:text="${user.id}"></td>
                            <td th:text="${user.username}"></td>
                            <td th:text="${user.email}"></td>
                            <td>
                                <span th:each="role : ${user.roles}" th:text="${#strings.replace(role.name, 'ROLE_', '') + ' '}"></span>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
